<div class="rst-versions" data-toggle="rst-versions" role="note" aria-label="versions">
    <div class="rst-languages">
        {% if languages|length >= 1 %}
        <dl>
            <dt>{{ _('Languages') }}</dt>
        </dl>
        <table class="lang-switcher">
            {% for code, name, url in languages %}
            {% if loop.index0 % 3 == 0 %}<tr>{% endif %}
            <td><a href="{{ url }}/index.html" title="{{ name }}">{{ code }}</a></td>
            {% if loop.index % 3 == 0 or loop.last %}</tr>{% endif %}
            {% endfor %}
        </table>
        {% endif %}
    </div>
</div>
