name: Wails build

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GoLang
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version: 1.25.12
          cache: true

      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
        shell: bash

      - name: Go vet
        run: go vet ./...
        shell: bash

      - name: Run Go tests
        run: go test -timeout 1200s -race -count=1 ./...
        shell: bash

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '23.4.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: npm ci && npm test
        shell: bash

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '23.4.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci
        shell: bash

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
        shell: bash

      - name: Frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
        shell: bash

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GoLang
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version: 1.25.12
          cache: true

      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
        shell: bash

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=3 -timeout=10m ./... 2>&1 | tee bench.txt
        shell: bash

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.txt

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '23.4.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run format:check
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GoLang
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version: 1.25.12
          cache: true

      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
        shell: bash

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  govulncheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create frontend dist stub
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
        shell: bash

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.25.12
          check-latest: true
          repo-checkout: false

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, ubuntu-22.04]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set outputs
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      # Setup and configure GoLang
      - name: Setup GoLang
        uses: actions/setup-go@v5
        with:
          check-latest: true
          go-version: 1.25.12
          cache: true
      - run: go version
        shell: bash

      # Setup and configure NodeJS
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: v23.4.0
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # install wails
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2
        shell: bash

      - name: Install UPX
        if: runner.os == 'Windows'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Linux Wails deps for libwebkit2gtk-4.0
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install libgtk-3-0 libwebkit2gtk-4.0-dev gcc-aarch64-linux-gnu
        shell: bash

      - name: Install Linux Wails deps for libwebkit2gtk-4.1
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install libgtk-3-0 libwebkit2gtk-4.1-dev gcc-aarch64-linux-gnu
        shell: bash

      - name: Build App Linux for libwebkit2gtk-4.0
        if: matrix.os == 'ubuntu-22.04'
        run: wails build --platform 'linux' -o blunderDB-linux-${{ steps.vars.outputs.version }} -upx -clean
        shell: bash

      - name: Build App Linux for libwebkit2gtk-4.1
        if: matrix.os == 'ubuntu-latest'
        run: wails build --platform 'linux' -o blunderDB-linux-webkit2gtk-4.1-${{ steps.vars.outputs.version }} -upx -clean -tags webkit2_41
        shell: bash
        
      - name: Build App Windows
        if: runner.os == 'Windows'
        run: wails build --platform 'windows' -o blunderDB-windows-${{ steps.vars.outputs.version }}.exe -upx -clean -tags webkit2_41
        shell: bash

      # Note: Windows binaries are not code-signed. Free OSS Authenticode signing
      # via the SignPath Foundation was applied for but the application was
      # declined, and paid EV certificates are out of scope for this free project.
      # Users mitigate the SmartScreen warning manually (see the Windows security
      # appendix in the docs) and can verify the published .sha256 checksum.

      - name: Build App MacOS
        if: runner.os == 'macOS'
        run: |
          # Inject the version and output name into wails.json so Info.plist gets the correct
          # CFBundleVersion and CFBundleExecutable ({{.Name}} must match the actual binary name)
          VERSION="${{ steps.vars.outputs.version }}"
          OUTPUT_NAME="blunderDB-macos-${VERSION}"
          if command -v jq &> /dev/null; then
            jq --arg v "$VERSION" --arg n "$OUTPUT_NAME" \
              '.info.productVersion = $v | .name = $n | .outputfilename = $n' \
              wails.json > wails.json.tmp && mv wails.json.tmp wails.json
          else
            sed -i '' "s/\"productVersion\": \"[^\"]*\"/\"productVersion\": \"$VERSION\"/" wails.json
            sed -i '' "s/\"name\": \"[^\"]*\"/\"name\": \"$OUTPUT_NAME\"/" wails.json
            sed -i '' "s/\"outputfilename\": \"[^\"]*\"/\"outputfilename\": \"$OUTPUT_NAME\"/" wails.json
          fi
          wails build --platform 'darwin/universal' -clean -tags webkit2_41
        shell: bash
        
      - name: Add Linux perms
        if: runner.os == 'Linux'
        run: chmod +x build/bin/*
        shell: bash

      # Ship a .tar.gz alongside each raw Linux binary: extracting a tarball
      # preserves the execute bit, so novices no longer need `chmod +x`. The
      # binary is renamed to `blunderdb` inside the archive and bundled with the
      # .desktop entry, icon and INSTALL notes.
      - name: Package Linux tar.gz
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for bin in build/bin/blunderDB-linux-*; do
            [ -f "$bin" ] || continue
            base="$(basename "$bin")"
            tmp="$(mktemp -d)"
            stage="$tmp/$base"
            mkdir -p "$stage"
            cp "$bin" "$stage/blunderdb"
            chmod +x "$stage/blunderdb"
            cp build/linux/blunderdb.desktop build/linux/blunderdb-256.png \
               build/linux/io.github.kevung.blunderDB.metainfo.xml \
               build/linux/INSTALL.txt LICENSE "$stage/"
            tar -czf "build/bin/${base}.tar.gz" -C "$tmp" "$base"
            rm -rf "$tmp"
          done

      # Build native .deb and .rpm from the webkit2gtk-4.1 binary via nfpm (a
      # single spec, no dpkg-deb/rpmbuild). Installs the bit +x, menu entry,
      # icon and the right webkit dependency per distro. Only the 4.1 variant is
      # packaged; older distros keep the raw binary + tar.gz.
      - name: Build .deb and .rpm (webkit2gtk-4.1)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          export PATH="$PATH:$(go env GOPATH)/bin"
          # nfpm does not expand env vars in the `src` glob, so stage the binary
          # at the fixed path nfpm.yaml expects, then remove the bare copy so it
          # is not uploaded to the release.
          cp "build/bin/blunderDB-linux-webkit2gtk-4.1-${VERSION}" build/bin/blunderdb
          nfpm package -f build/linux/nfpm.yaml -p deb -t "build/bin/blunderdb_${VERSION}_amd64.deb"
          nfpm package -f build/linux/nfpm.yaml -p rpm -t "build/bin/blunderdb-${VERSION}.x86_64.rpm"
          rm -f build/bin/blunderdb

      - name: Add macOS perms
        if: runner.os == 'macOS'
        run: chmod +x build/bin/*/Contents/MacOS/*
        shell: bash

      - name: Build .app zip file
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --keepParent ./build/bin/blunderDB-macos-${{ steps.vars.outputs.version }}.app ./build/bin/blunderDB-macos-${{ steps.vars.outputs.version }}.zip


      # Publish SHA256 checksums alongside each binary so users can verify their
      # download (helps mitigate SmartScreen/antivirus distrust at zero cost).
      # The .sha256 files land in build/bin/ and are picked up by the release
      # glob below. `sha256sum` exists in Git Bash on Windows and on Linux;
      # macOS falls back to `shasum -a 256`. Directories (the .app bundle) are
      # skipped — only the distributable files are hashed.
      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd build/bin
          for f in *; do
            [ -f "$f" ] || continue
            case "$f" in *.sha256) continue;; esac
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      # Upload build assets
      - uses: actions/upload-artifact@v4
        with:
          name: Wails Build ${{matrix.os}} blunderDB ${{ steps.vars.outputs.version }}
          path: |
            */bin/
            *\bin\*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            */bin/*

  docs:
    runs-on: ubuntu-latest
    # Serialize Pages deploys so bursts of merges (or a merge racing a tag
    # push) queue instead of colliding on the gh-pages branch. cancel-in-progress
    # stays false: every push should publish, none should be dropped.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set outputs
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./doc/requirements.txt
          sudo apt-get update && sudo apt-get install -y latexmk texlive-xetex texlive-fonts-recommended texlive-latex-extra fonts-freefont-otf fonts-noto-cjk texlive-lang-cjk
        shell: bash

      - name: Build documentation
        run: |
          cd ./doc
          python build.py

      - name: Rename PDF files
        run: |
          for lang in fr en de el es fi it ja ru; do
            find ./doc/build/pdf_${lang}/ -name '*.pdf' -exec mv {} ./doc/build/pdf_${lang}/blunderDB-${{ steps.vars.outputs.version }}-${lang}.pdf \;
          done
        shell: bash

      - name: Create index.html for redirection
        run: |
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=en/"></head><body></body></html>' > ./doc/build/index.html

      - name: Deploy to GitHub Pages
        # Only publish on push (main / tags); pull_request runs still build the
        # docs above to catch breakage, but must not push to gh-pages — doing so
        # both pollutes the published site and races the real push deploys.
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./doc/build
          publish_branch: gh-pages
          keep_files: false  # This will clean the branch before deploying

      # Upload build assets
      - uses: actions/upload-artifact@v4
        with:
          name: blunderDB pdf docs
          path: |
            */build/pdf_*/*.pdf

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            */build/pdf_*/*.pdf
